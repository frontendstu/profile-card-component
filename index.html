<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Frontend Mentor &vert; Profile Card Component</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <article class="card profile-card">
        <div class="profile-cover">
          <img
            src="assets/images/bg-pattern-card.svg"
            alt="Profile cover image"
          />
        </div>

        <div class="profile-details">
          <div class="profile-img">
            <img
              src="assets/images/image-victor.jpg"
              alt=""
              aria-hidden="none"
            />
          </div>

          <h1 class="card-title">Victor Crest <small>26</small></h1>
          <h2 class="card-heading">London</h2>

          <hr />

          <ul class="profile-stats">
            <li>80K <span>Followers</span></li>
            <li>803K <span>Likes</span></li>
            <li>1.4K <span>Photos</span></li>
          </ul>
        </div>
      </article>
    </main>

    <script src="js/scripts.js"></script>
  </body>
</html>
